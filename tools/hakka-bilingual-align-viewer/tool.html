<section class="hakka-align-tool">
  <div class="tool-header-block">
    <h1 class="tool-title">客語雙語例句對齊檢視器</h1>
    <p class="tool-desc">
      自動載入客語辭典例句對應結果，支援六腔調篩選、關鍵字搜尋、詞語對齊高亮檢視。
    </p>
  </div>

  <div class="search-row">
    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="輸入關鍵字搜尋（客語／華語／詞目）..."
      disabled
    >
  </div>

  <section class="dialect-filters" aria-label="腔調篩選">
    <label><input class="dialect-cb" type="checkbox" value="四縣" checked> 四縣</label>
    <label><input class="dialect-cb" type="checkbox" value="海陸" checked> 海陸</label>
    <label><input class="dialect-cb" type="checkbox" value="大埔" checked> 大埔</label>
    <label><input class="dialect-cb" type="checkbox" value="饒平" checked> 饒平</label>
    <label><input class="dialect-cb" type="checkbox" value="詔安" checked> 詔安</label>
    <label><input class="dialect-cb" type="checkbox" value="南四縣" checked> 南四縣</label>
  </section>

  <div class="status-row">
    <div id="statusMsg" class="status-msg">正在載入資料...</div>
  </div>

  <div id="resultsArea" class="results-area"></div>

  <div id="loadMoreArea" class="load-more-area hidden">
    <button id="btnLoadMore" class="btn-load">顯示更多</button>
  </div>
</section>
