<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客語雙語例句對齊檢視器</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="./tool.css">
</head>
<body>
  <div class="tool-page">
    <header class="search-container">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-xl-10 col-lg-11">
            <div class="tool-header mb-3">
              <h1 class="tool-title">客語雙語例句對齊檢視器</h1>
              <div class="tool-subtitle">
                支援六腔調篩選、關鍵字搜尋、詞對齊高亮檢視
              </div>
            </div>

            <section id="fileLoadSection" class="file-load-section">
              <div class="file-load-title">資料載入</div>
              <div class="file-load-row">
                <button id="btnLoadDefaultData" class="btn btn-outline-primary btn-sm">
                  載入預設資料
                </button>

                <label for="jsonFileInput" class="btn btn-outline-secondary btn-sm mb-0">
                  選擇 JSON 檔案
                </label>
                <input type="file" id="jsonFileInput" accept=".json" hidden>

                <span id="currentDataSource" class="current-data-source">
                  尚未載入資料
                </span>
              </div>
            </section>

            <div class="input-group input-group-lg mt-3">
              <span class="input-group-text bg-white border-end-0">🔍</span>
              <input
                type="text"
                id="searchInput"
                class="form-control border-start-0"
                placeholder="輸入關鍵字搜尋（客語／華語／詞目）..."
                disabled
              >
            </div>

            <section class="dialect-filters mt-3" aria-label="腔調篩選">
              <div class="form-check form-check-inline">
                <input class="form-check-input dialect-cb" type="checkbox" id="cbSiXian" value="四縣" checked>
                <label class="form-check-label" for="cbSiXian">四縣</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input dialect-cb" type="checkbox" id="cbHaiLu" value="海陸" checked>
                <label class="form-check-label" for="cbHaiLu">海陸</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input dialect-cb" type="checkbox" id="cbDaPu" value="大埔" checked>
                <label class="form-check-label" for="cbDaPu">大埔</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input dialect-cb" type="checkbox" id="cbRaoPing" value="饒平" checked>
                <label class="form-check-label" for="cbRaoPing">饒平</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input dialect-cb" type="checkbox" id="cbZhaoAn" value="詔安" checked>
                <label class="form-check-label" for="cbZhaoAn">詔安</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input dialect-cb" type="checkbox" id="cbNanSi" value="南四縣" checked>
                <label class="form-check-label" for="cbNanSi">南四縣</label>
              </div>
            </section>

            <div class="status-row">
              <div id="statusMsg" class="status-msg">請先載入資料</div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-xl-10 col-lg-11">
          <div id="resultsArea"></div>

          <div id="loadMoreArea" class="text-center my-4 d-none">
            <button id="btnLoadMore" class="btn btn-outline-primary px-5">顯示更多</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="./tool.js"></script>
</body>
</html>
