<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客語智慧工具箱</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="app-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>客語工具箱</h2>
            </div>
            <ul class="nav-menu">
                <li>
                    <button class="nav-item" onclick="loadTool('pinyin-tool')">
                        <span class="icon">⌨️</span> 拼音智慧處理
                    </button>
                </li>
                <li>
                    <button class="nav-item" onclick="loadTool('hakka-bilingual-align-viewer')">
                        <span class="icon">🈶</span> 客語雙語例句檢索系統
                    </button>
                </li>
                <li>
                    <button class="nav-item disabled">
                        <span class="icon">📂</span> 更多功能開發中...
                    </button>
                </li>
            </ul>
        </nav>

        <main class="content-area">
            <div id="tool-container">
                <div class="welcome-screen">
                    <h1>歡迎使用客語智慧工具箱</h1>
                    <p>請從左側選單選擇您想使用的工具。</p>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
